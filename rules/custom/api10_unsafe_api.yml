rules:
  - id: api10-requests-no-status-check
    patterns:
      - pattern: |
          $RESP = requests.get(...)
          $DATA = $RESP.json()
      - pattern-not: |
          $RESP = requests.get(...)
          $RESP.raise_for_status()
          $DATA = $RESP.json()
    message: "[API10:2023] External API response used without raise_for_status(). Validate status and schema."
    languages: [python]
    severity: MEDIUM
    metadata:
      owasp: "API10:2023 - Unsafe Consumption of APIs"
      cwe: "CWE-20"
