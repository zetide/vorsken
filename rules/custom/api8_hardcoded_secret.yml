rules:
  - id: api8-hardcoded-secret-key
    patterns:
      - pattern: |
          SECRET_KEY = "$VALUE"
      - pattern-not: |
          SECRET_KEY = os.environ[...]
    message: "[API8:2023] Hardcoded SECRET_KEY. Use os.environ['SECRET_KEY']."
    languages: [python]
    severity: CRITICAL
    metadata:
      owasp: "API8:2023 - Security Misconfiguration"
      cwe: "CWE-798"
